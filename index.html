<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imaginedle</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bonjour dos! -->
</head>
<body>
    <h1>Imaginedle</h1>
    <div id="input-container">
        <div id="input-wrapper">
            <input type="text" placeholder="Saisir un nom">
            <div id="suggestions"></div>
        </div>
        <button id="hintBtn" style="display: none;">Hint (0/5)</button>
    </div>
    <div id="results">
        <div id="header" style="display: none;">
            <div class="name">Name</div>
            <div class="sex">Genre</div>
            <div class="ues">Participe dans les UE</div>
            <div class="firstPub">Année de 1e publication</div>
            <div class="team">Équipe</div>
        </div>
        <div id="rows">
            <!--div class="row">
                <div class="name">Name</div>
                <div class="sex">Genre</div>
                <div class="ues">Participe dans les UE</div>
                <div class="firstPub">Année de 1e publication</div>
                <div class="team">Équipe</div>
            </div-->
        </div>
    </div>
    <div id="win" style="display: none;">

    </div>
    
    <script src="script.js"></script>
</body>

</html>
